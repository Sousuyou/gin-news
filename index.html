<style>
  /* ====== お手本（カクテル原価計算ツール）と同じデザイントークン ====== */
  :root {
    color-scheme: light dark;
    --bg: #e9e9e5;          /* 背景：生成り色 */
    --paper: #fbfaf6;       /* 紙のパネル */
    --panel: #fbfaf6;
    --panel-soft: #f3f2ee;  /* やや沈んだパネル */
    --field: #ffffff;
    --line: #c9c8c2;        /* 細い罫線 */
    --line-strong: #242424; /* 強い黒の罫線 */
    --text: #161616;        /* 本文の黒 */
    --muted: #6f6d67;       /* 補助グレー */
    --accent: #161616;      /* アクセント＝黒 */
    --on-accent: #ffffff;   /* accent色の上に乗せる文字色 */
    --red: #a72821;         /* 強調の赤 */
    --shadow: 0 18px 42px rgba(30, 30, 27, 0.08);
  }

  /* ===== ダークモード（端末設定に自動追従） ===== */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14130f;
      --paper: #1c1b16;
      --panel: #1c1b16;
      --panel-soft: #242219;
      --field: #211f19;
      --line: #3a382f;
      --line-strong: #6f6c5f;
      --text: #ece9df;
      --muted: #a09c8e;
      --accent: #ece9df;
      --on-accent: #14130f;
      --red: #d8736c;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont,
                 "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  button { font: inherit; }

  /* ====== 外枠（紙の額縁） ====== */
  .app-shell {
    width: min(960px, calc(100% - 24px));
    min-height: calc(100vh - 48px);
    margin: 24px auto;
    padding: 28px;
    border: 1px solid var(--line-strong);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  /* ====== 見出しエリア ====== */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    gap: 18px;
    align-items: stretch;
    padding: 0 0 18px;
    border-bottom: 2px solid var(--line-strong);
  }
  .brand-mark {
    margin: 0 0 8px;
    font-size: clamp(1.05rem, 2.5vw, 1.5rem);
    line-height: 1;
    font-weight: 700;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.05rem, 2.5vw, 1.55rem);
    line-height: 1.18;
    font-weight: 700;
  }
  .lead {
    max-width: 620px;
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.65;
  }
  /* 見出し右の状態パネル（件数・更新時刻） */
  .hero-panel {
    padding: 14px;
    border: 1px solid var(--line-strong);
    background: transparent;
    display: grid;
    align-content: center;
  }
  .hero-panel span,
  .hero-panel small {
    display: block;
    color: var(--muted);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hero-panel strong {
    display: block;
    margin: 6px 0 2px;
    color: var(--red);
    font-size: 1.65rem;
    font-weight: 700;
  }

  /* ====== カテゴリ切り替え（タブ） ====== */
  .tabs {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .tab {
    flex: 1 1 auto;
    min-height: 40px;
    padding: 0 14px;
    border: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
    white-space: nowrap;

  .tab:last-child { border-right: 0; }
  .tab:hover { background: var(--panel-soft); }
  .tab.active {
    background: var(--accent);
    color: var(--on-accent);
  }

  /* ====== 操作バー（更新ボタン・状態） ====== */
  .toolbar {
    margin-top: 16px;

    align-items: center;

    color: var(--muted);

  .reload-btn {

    color: var(--text);

  /* ====== ニュース一覧 ====== */
  .feed {
    margin-top: 16px;
    display: grid;
    gap: 0;
    border: 1px solid var(--line);

  .article {
    display: block;
    padding: 16px 18px;

    background: var(--panel);

    transition: background 160ms ease;

  .article:hover { background: var(--panel-soft); }
  .article .cat {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--red);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  .article h3 {

    font-weight: 700;

  .article .meta {
    font-size: 0.66rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;

    align-items: center;

  .article .meta .meta-text { flex: 1; min-width: 0; }
  .article .meta .src { color: var(--text); }
  /* 共有ボタン（記事ごと） */
  .share-btn {

    color: var(--text);

    border: 1px solid var(--line-strong);

  .pickup-head {

    font-weight: 700;

  .pickup-head .pickup-note {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: 0.6rem;
    font-weight: 700;

  }
  .pickup-item {
    display: block;
    padding: 11px 14px;
    text-decoration: none;
    color: inherit;
    border-bottom: 1px solid var(--line);

  }
  .pickup-item:last-child { border-bottom: 0; }
  .pickup-item:hover { background: var(--panel-soft); }
  .pickup-item .pickup-title {
    margin: 0;

    font-weight: 700;

  /* 翻訳時に下へ小さく出す原題 */
  .article .orig {

  /* ====== 読み込み中・空表示 ====== */
  .loading, .empty {

  /* ====== サイト共通ナビ ====== */
  .site-nav {
    width: min(960px, calc(100% - 24px));

    border: 1px solid var(--line-strong);

  /* ====== スマホ対応 ====== */
  @media (max-width: 620px) {

</style>

<main class="app-shell">

  <!-- 見出し -->
  <section class="hero">
    <div>
      <p class="brand-mark">Bar Soutsu</p>
      <p class="eyebrow">Gin News Feed / World &amp; Japan</p>
      <h1>ジン最新ニュース</h1>
      <p class="lead">世界中・日本中のジン情報を自動で収集してお届けします。海外記事は日本語タイトルに翻訳済み。新商品、クラフトジン、バー・業界トレンド、受賞情報をまとめて確認できます。</p>
    </div>

      <strong id="countNum">—</strong>

    </div>

    <button class="reload-btn" id="reloadBtn">↻ 最新に更新</button>

  </footer>

<script>
/* =========================================================
   ■ カテゴリの定義（表示順とタブ名）
   実際のニュースデータは news.json にあらかじめ用意されており、
   このページはそれを読み込んで表示するだけです（中継サービス不要）。
   ニュースの取得・英語タイトルの翻訳は、GitHubの自動機能が
   約3時間ごとにサーバー側で行っています（build_news.py）。
   ========================================================= */
const CATEGORIES = [
  { id: "all",   name: "すべて" },
  { id: "world", name: "海外の新商品" },
  { id: "japan", name: "日本のクラフトジン" },
  { id: "trend", name: "バー・業界トレンド" },
  { id: "award", name: "受賞・コンペ" },
  { id: "event", name: "イベント・限定品" },
  { id: "newdistillery", name: "新設蒸留所・オープン" },
];

let newsData = null;        // 読み込んだ news.json をまるごと保持
let currentCategory = "all";

const feedEl = document.getElementById("feed");
const statusEl = document.getElementById("status");
const countNumEl = document.getElementById("countNum");
const updatedAtEl = document.getElementById("updatedAt");
const pickupEl = document.getElementById("pickup");

/* =========================================================
   ■ 新着バッジ用：前回このページを見た時刻を localStorage に保存
   それより新しい記事に「NEW」バッジを付けます。
   （file:// やプライベートモードでも落ちないよう try-catch で保護）
   ========================================================= */
const LAST_VIEW_KEY = "ginNews_lastViewedAt";
// 今回の判定に使う「前回閲覧時刻」（このページを開いた時点で一度だけ読み込む）
let lastViewedAt = readLastViewedAt();

function readLastViewedAt() {
  try {
    const v = localStorage.getItem(LAST_VIEW_KEY);
    if (!v) return null;
    const t = new Date(v).getTime();
    return isNaN(t) ? null : t;
  } catch (e) {
    return null; // localStorage が使えない環境では新着判定を無効化
  }
}

function saveLastViewedAt() {
  try {
    localStorage.setItem(LAST_VIEW_KEY, new Date().toISOString());
  } catch (e) {
    /* 保存できなくても表示には影響しないので無視します */
  }
}

// 記事が「前回閲覧時刻」より新しいかどうか（新着＝NEW判定）
function isNewArticle(a) {
  if (lastViewedAt === null) return false; // 初回訪問時は全部NEWにしないでおく
  if (!a || !a.date) return false;
  const t = new Date(a.date).getTime();
  if (isNaN(t)) return false;
  return t > lastViewedAt;
}

/* =========================================================
   ■ データの読み込み
   ========================================================= */
async function loadData() {
  feedEl.innerHTML = '<div class="loading"><div class="spinner"></div>ニュースを読み込んでいます…</div>';
  statusEl.textContent = "読み込み中…";
  countNumEl.textContent = "—";
  updatedAtEl.textContent = "読み込み中";

  try {
    // キャッシュ回避のため時刻を付けて毎回最新の news.json を取得
    const res = await fetch("news.json?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("読み込み失敗");
    newsData = await res.json();
  } catch (e) {
    newsData = null;
    feedEl.innerHTML = '<div class="empty">ニュースデータを読み込めませんでした。<br>少し時間をおいて「↻ 最新に更新」を押してみてください。</div>';
    statusEl.textContent = "";
    countNumEl.textContent = "0";
    updatedAtEl.textContent = "読み込み失敗";
    return;
  }
  renderPickup();        // 今日のまとめ（最新3件）を先に描画
  showCategory(currentCategory);
  saveLastViewedAt();    // 描画が終わったら「今見た時刻」を保存（次回のNEW判定用）
}

/* =========================================================
   ■ 今日のまとめ（ピックアップ）
   全カテゴリ横断で最新3件をコンパクトに見せるダイジェスト枠。
   出勤時にここだけ見れば最新が分かるようにしています。
   記事が3件未満ならある分だけ表示します。
   ========================================================= */
function renderPickup() {
  // 「すべて」と同じ結合・重複除去・新しい順ロジックを再利用
  const top = articlesFor("all").slice(0, 3);
  if (top.length === 0) {
    pickupEl.hidden = true;
    pickupEl.innerHTML = "";
    return;
  }

  const items = top.map((a) => {
    const dateStr = a.date ? formatDate(a.date) : "";
    const newBadge = isNewArticle(a) ? '<span class="new-badge">New</span>' : "";
    return `
      <a class="pickup-item" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
        <p class="pickup-title">${escapeHtml(a.title)}${newBadge}</p>
        <div class="pickup-meta">
          <span class="src">${escapeHtml(a.source || "ニュース")}</span>${dateStr ? " ・ " + dateStr : ""}
        </div>
      </a>`;
  }).join("");

  pickupEl.innerHTML =
    '<div class="pickup-head">今日のまとめ（ピックアップ）' +
    '<span class="pickup-note">出勤時はここだけ見れば最新が分かります。最新の' + top.length + '件です。</span>' +
    '</div>' + items;
  pickupEl.hidden = false;
}

/* =========================================================
   ■ カテゴリごとの記事リストを作る
   ========================================================= */
function articlesFor(catId) {
  if (!newsData || !newsData.categories) return [];
  if (catId !== "all") {
    return (newsData.categories[catId] || []).slice();
  }
  // 「すべて」= 全カテゴリを結合し、タイトルで重複を除去して新しい順に
  const merged = [];
  const seen = new Set();
  Object.keys(newsData.categories).forEach((cid) => {
    newsData.categories[cid].forEach((a) => {
      const key = (a.title || "").trim();
      if (seen.has(key)) return;
      seen.add(key);
      merged.push(Object.assign({ _cat: cid }, a));
    });
  });
  merged.sort((x, y) => (y.date || "").localeCompare(x.date || ""));
  return merged;
}

// カテゴリIDから表示名を引く
function catName(catId) {
  const c = CATEGORIES.find((c) => c.id === catId);
  return c ? c.name : "";
}

/* =========================================================
   ■ 画面に表示する
   ========================================================= */
function showCategory(catId) {
  currentCategory = catId;
  const articles = articlesFor(catId);
  render(articles);
}

function render(articles) {
  if (!articles || articles.length === 0) {
    feedEl.innerHTML = '<div class="empty">このカテゴリのニュースはまだありません。</div>';
    statusEl.textContent = "";
    countNumEl.textContent = "0";
    return;
  }

  const showCat = currentCategory === "all"; // 「すべて」表示の時だけカテゴリ名を出す
  feedEl.innerHTML = articles.map((a) => {
    const dateStr = a.date ? formatDate(a.date) : "";
    const cat = a._cat || currentCategory;
    return `
      <a class="article" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
        ${showCat ? `<span class="cat">${escapeHtml(catName(cat))}</span>` : ""}
        <h3>${escapeHtml(a.title)}${isNewArticle(a) ? '<span class="new-badge">New</span>' : ""}</h3>
        ${a.originalTitle ? `<div class="orig">原題: ${escapeHtml(a.originalTitle)}</div>` : ""}
        <div class="meta">
          <span class="meta-text"><span class="src">${escapeHtml(a.source || "ニュース")}</span>${dateStr ? " ・ " + dateStr : ""}</span>
          <button class="share-btn" type="button" data-link="${escapeHtml(a.link)}" data-title="${escapeHtml(a.title)}" aria-label="この記事を共有">↗ 共有</button>
        </div>
      </a>`;
  }).join("");

  statusEl.textContent = "新しい順に表示中";
  countNumEl.textContent = articles.length;
  // 更新時刻は news.json の updated を表示
  if (newsData && newsData.updated) {
    updatedAtEl.textContent = "更新 " + formatDate(newsData.updated);
  }
}

// 日付（ISO文字列）を見やすい形にする
function formatDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return "たった今";
  if (diffMin < 60) return `${diffMin}分前`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour}時間前`;
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

// 安全のため、文字列をそのまま表示できる形に変換
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* =========================================================
   ■ タブ（カテゴリ切り替えボタン）を作る
   ========================================================= */
const tabsEl = document.getElementById("tabs");
CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = cat.name;
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");
    showCategory(cat.id);
  };
  tabsEl.appendChild(btn);
});

// 「最新に更新」ボタン（news.jsonを取り直す）
document.getElementById("reloadBtn").onclick = () => loadData();

/* =========================================================
   ■ 記事ごとの共有ボタン
   スマホ等：OS標準の共有メニュー（LINE/X/コピー等）を開く
   非対応（多くのPC）：リンクをクリップボードにコピー
   feedは作り直されるので、親(feed)に1つだけ委譲リスナーを置く
   ========================================================= */
feedEl.addEventListener("click", async (e) => {
  const btn = e.target.closest(".share-btn");
  if (!btn) return;
  e.preventDefault();   // 記事リンクへの遷移を止める
  e.stopPropagation();
  const link = btn.dataset.link || "";
  const title = btn.dataset.title || "";
  // ① OS標準の共有メニュー（対応端末）
  if (navigator.share) {
    try { await navigator.share({ title: title, text: title, url: link }); }
    catch (err) { /* ユーザーがキャンセルした等は無視 */ }
    return;
  }
  // ② 非対応ならリンクをコピー
  const ok = await copyText(link);
  const original = btn.textContent;
  btn.textContent = ok ? "コピー✓" : "コピー失敗";
  setTimeout(() => { btn.textContent = original; }, 1500);
});

// クリップボードへコピー（新APIが使えない環境のフォールバック付き）
async function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) { /* 下の方式へ */ }
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

// 最初の読み込み
loadData();
</script>

    });
