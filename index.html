<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界のジン最新ニュース</title>
<style>
  /* ====== 全体のデザイン設定 ====== */
  :root {
    --bg: #0f1419;        /* 背景色（濃い紺） */
    --card: #1a2129;      /* カードの色 */
    --accent: #6ab7a8;    /* アクセント色（ジンらしい青緑＝ボタニカルなイメージ） */
    --text: #e8eaed;      /* 文字色 */
    --sub: #9aa4af;       /* 補助文字色 */
    --border: #2a323c;    /* 枠線の色 */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    line-height: 1.6;
    padding: 0 0 60px;
  }

  /* ====== ヘッダー ====== */
  header {
    background: linear-gradient(135deg, #16323a, #0f1419);
    padding: 28px 20px 22px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  header h1 { font-size: 1.6rem; letter-spacing: 0.04em; }
  header h1 .leaf { color: var(--accent); }
  header p.sub { color: var(--sub); font-size: 0.85rem; margin-top: 6px; }

  /* ====== カテゴリ切り替えタブ ====== */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 18px 14px 6px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.15s;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--accent); }
  .tab.active {
    background: var(--accent);
    color: #0f1419;
    font-weight: bold;
    border-color: var(--accent);
  }

  /* ====== 更新ボタンと状態表示 ====== */
  .toolbar {
    max-width: 820px;
    margin: 14px auto 0;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .status { color: var(--sub); font-size: 0.8rem; }
  .reload-btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .reload-btn:hover { background: rgba(106,183,168,0.12); }

  /* ====== ニュース一覧 ====== */
  .feed {
    max-width: 820px;
    margin: 16px auto 0;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .article {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    transition: 0.15s;
  }
  .article:hover { border-color: var(--accent); transform: translateY(-2px); }
  .article .cat {
    display: inline-block;
    font-size: 0.7rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 1px 8px;
    margin-bottom: 8px;
  }
  .article h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
  .article .meta { font-size: 0.76rem; color: var(--sub); }
  .article .meta .src { color: #c0c8d0; }

  /* ====== 読み込み中・エラー表示 ====== */
  .loading, .empty {
    text-align: center;
    color: var(--sub);
    padding: 50px 20px;
    font-size: 0.9rem;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center;
    color: var(--sub);
    font-size: 0.72rem;
    margin-top: 40px;
    padding: 0 20px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <h1><span class="leaf">🌿</span> 世界のジン最新ニュース</h1>
  <p class="sub">世界中・日本中のジン情報を自動収集してお届けします</p>
</header>

<!-- カテゴリ切り替えタブ -->
<nav class="tabs" id="tabs"></nav>

<!-- 更新ボタンと状態 -->
<div class="toolbar">
  <span class="status" id="status"></span>
  <button class="reload-btn" id="reloadBtn">↻ 最新に更新</button>
</div>

<!-- ニュース一覧の表示場所 -->
<main class="feed" id="feed"></main>

<footer>
  情報源：Googleニュース（世界中のニュースサイトを自動集約）<br>
  ※ニュースは各記事の発信元サイトに移動して表示されます。記事タイトルをクリックしてください。
</footer>

<script>
/* =========================================================
   ■ カテゴリの設定
   各カテゴリごとに「Googleニュースで何を検索するか」を決めています。
   検索ワードを変えれば、読みたいニュースを自由に調整できます。
   q   : 検索キーワード
   lang: 言語と地域（ja=日本語/日本、en=英語/アメリカ）
   ========================================================= */
const CATEGORIES = [
  {
    id: "all",
    name: "すべて",
    // 「すべて」は下の各カテゴリを全部まとめて表示します
  },
  {
    id: "world",
    name: "🌍 海外の新商品・ブランド",
    feeds: [
      { q: "gin distillery new release", lang: "en" },
      { q: "new gin launch brand",       lang: "en" },
    ],
  },
  {
    id: "japan",
    name: "🇯🇵 日本のクラフトジン",
    feeds: [
      { q: "クラフトジン",            lang: "ja" },
      { q: "ジン 蒸留所 新発売",      lang: "ja" },
    ],
  },
  {
    id: "trend",
    name: "🍸 バー・業界トレンド",
    feeds: [
      { q: "gin cocktail bar trend",  lang: "en" },
      { q: "ジン カクテル バー",       lang: "ja" },
    ],
  },
  {
    id: "award",
    name: "🏆 受賞・コンペ",
    feeds: [
      { q: "gin awards winner",            lang: "en" },
      { q: "World Gin Awards",             lang: "en" },
    ],
  },
];

/* =========================================================
   ■ ニュースの取得処理
   GoogleニュースのRSS（ニュース配信データ）を読み込みます。
   そのままだとブラウザの制限で読めないため、
   間に「中継サービス」を挟んでデータを取得します。
   うまくいかない時のために中継サービスを2つ用意し、
   順番に試します。
   ========================================================= */

// 中継サービス（プロキシ）の一覧。前から順に試します。
const PROXIES = [
  (url) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  (url) => "https://corsproxy.io/?url=" + encodeURIComponent(url),
];

// GoogleニュースのRSSのURLを組み立てる
function buildGoogleNewsUrl(q, lang) {
  const base = "https://news.google.com/rss/search?q=" + encodeURIComponent(q);
  if (lang === "ja") {
    return base + "&hl=ja&gl=JP&ceid=JP:ja";
  }
  return base + "&hl=en-US&gl=US&ceid=US:en";
}

// 1つのRSSを取得して、記事の配列に変換する
async function fetchFeed(feed, categoryName) {
  const rssUrl = buildGoogleNewsUrl(feed.q, feed.lang);

  // 中継サービスを順番に試す
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(rssUrl), { cache: "no-store" });
      if (!res.ok) continue;
      const text = await res.text();
      const items = parseRss(text, categoryName);
      if (items.length > 0) return items;
    } catch (e) {
      // この中継がダメだったら次を試す
    }
  }
  return []; // 全部ダメだった場合は空
}

// RSS（XML形式の文字データ）を読み取って記事リストにする
function parseRss(xmlText, categoryName) {
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  const items = [...doc.querySelectorAll("item")];
  return items.map((item) => {
    const title = item.querySelector("title")?.textContent || "(タイトルなし)";
    const link  = item.querySelector("link")?.textContent || "#";
    const pubDate = item.querySelector("pubDate")?.textContent || "";
    // Googleニュースは「タイトル - 発信元」の形式なので発信元を分離
    let cleanTitle = title;
    let source = item.querySelector("source")?.textContent || "";
    const dashIndex = title.lastIndexOf(" - ");
    if (!source && dashIndex > 0) {
      cleanTitle = title.slice(0, dashIndex);
      source = title.slice(dashIndex + 3);
    }
    return {
      title: cleanTitle,
      link,
      source,
      date: pubDate ? new Date(pubDate) : null,
      category: categoryName,
    };
  });
}

/* =========================================================
   ■ 画面に表示する処理
   ========================================================= */
const feedEl = document.getElementById("feed");
const statusEl = document.getElementById("status");
let currentCategory = "all";
let cache = {}; // 一度取得したニュースを覚えておく入れ物

// 指定したカテゴリのニュースを取得して表示
async function loadCategory(catId, forceReload = false) {
  currentCategory = catId;

  // 「すべて」の場合は、世界・日本・トレンド・受賞を全部対象にする
  const targets = catId === "all"
    ? CATEGORIES.filter((c) => c.feeds)
    : CATEGORIES.filter((c) => c.id === catId);

  // すでに取得済みで再取得不要ならそれを表示
  if (!forceReload && cache[catId]) {
    render(cache[catId]);
    return;
  }

  // 読み込み中の表示
  feedEl.innerHTML = '<div class="loading"><div class="spinner"></div>世界中からニュースを集めています…</div>';
  statusEl.textContent = "取得中…";

  // 各カテゴリ・各検索ワードのRSSをまとめて取得
  const allFeeds = [];
  targets.forEach((cat) => {
    cat.feeds.forEach((f) => allFeeds.push(fetchFeed(f, cat.name)));
  });

  let results = [];
  try {
    const lists = await Promise.all(allFeeds);
    results = lists.flat();
  } catch (e) {
    results = [];
  }

  // 重複記事（同じタイトル）をまとめる
  const seen = new Set();
  results = results.filter((a) => {
    const key = a.title.trim();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // 新しい順に並べ替え
  results.sort((a, b) => {
    if (!a.date) return 1;
    if (!b.date) return -1;
    return b.date - a.date;
  });

  cache[catId] = results;
  render(results);
}

// 記事リストを実際に画面へ描き出す
function render(articles) {
  if (!articles || articles.length === 0) {
    feedEl.innerHTML = '<div class="empty">ニュースを取得できませんでした。<br>少し時間をおいて「↻ 最新に更新」を押してみてください。</div>';
    statusEl.textContent = "";
    return;
  }

  feedEl.innerHTML = articles.map((a) => {
    const dateStr = a.date ? formatDate(a.date) : "";
    const showCat = currentCategory === "all"; // 「すべて」表示の時だけカテゴリ名を出す
    return `
      <a class="article" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
        ${showCat ? `<span class="cat">${escapeHtml(a.category)}</span><br>` : ""}
        <h3>${escapeHtml(a.title)}</h3>
        <div class="meta">
          <span class="src">${escapeHtml(a.source || "ニュース")}</span>
          ${dateStr ? " ・ " + dateStr : ""}
        </div>
      </a>`;
  }).join("");

  statusEl.textContent = `${articles.length}件のニュース（更新: ${formatDate(new Date())}）`;
}

// 日付を「○月○日 ○○:○○」の見やすい形にする
function formatDate(d) {
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 60) return diffMin <= 1 ? "たった今" : `${diffMin}分前`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour}時間前`;
  const m = d.getMonth() + 1;
  const day = d.getDate();
  return `${m}月${day}日`;
}

// 安全のため、文字列をそのまま表示できる形に変換
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* =========================================================
   ■ タブ（カテゴリ切り替えボタン）を作る
   ========================================================= */
const tabsEl = document.getElementById("tabs");
CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = cat.name;
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");
    loadCategory(cat.id);
  };
  tabsEl.appendChild(btn);
});

// 「最新に更新」ボタン
document.getElementById("reloadBtn").onclick = () => {
  loadCategory(currentCategory, true);
};

// ページを開いたら最初に「すべて」を読み込む
loadCategory("all");
</script>
</body>
</html>
