<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- セキュリティ: 読み込み元を自サイトに限定（万一の不正スクリプト実行を阻止） -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
<meta name="theme-color" content="#f3f1ec" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14130f" media="(prefers-color-scheme: dark)">
<!-- 検索エンジンお断り（検索結果に表示させない設定） -->
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Bar Soutsu ジン最新ニュース</title>

<!-- SNS・チャットでURLを共有したときの見栄え（OGP / Twitter Card） -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Bar Soutsu">
<meta property="og:title" content="ジン最新ニュース｜Bar Soutsu">
<meta property="og:description" content="新作ボトルや業界トピックなど、ジンまわりの最新ニュースをまとめてチェック。">
<meta property="og:url" content="https://sousuyou.github.io/gin-news/">
<meta property="og:image" content="https://sousuyou.github.io/gin-news/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://sousuyou.github.io/gin-news/assets/og-image.png">

<!-- アプリ化（ホーム画面に追加・オフライン対応） -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icon.svg">
<style>
  /* ====== お手本（カクテル原価計算ツール）と同じデザイントークン ====== */
  :root {
    color-scheme: light dark;
    --bg: #e9e9e5;          /* 背景：生成り色 */
    --paper: #fbfaf6;       /* 紙のパネル */
    --panel: #fbfaf6;
    --panel-soft: #f3f2ee;  /* やや沈んだパネル */
    --field: #ffffff;
    --line: #c9c8c2;        /* 細い罫線 */
    --line-strong: #242424; /* 強い黒の罫線 */
    --text: #161616;        /* 本文の黒 */
    --muted: #6f6d67;       /* 補助グレー */
    --accent: #161616;      /* アクセント＝黒 */
    --on-accent: #ffffff;   /* accent色の上に乗せる文字色 */
    --red: #a72821;         /* 強調の赤 */
    --shadow: 0 18px 42px rgba(30, 30, 27, 0.08);
  }

  /* ===== ダークモード（端末設定に自動追従） ===== */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14130f;
      --paper: #1c1b16;
      --panel: #1c1b16;
      --panel-soft: #242219;
      --field: #211f19;
      --line: #3a382f;
      --line-strong: #6f6c5f;
      --text: #ece9df;
      --muted: #a09c8e;
      --accent: #ece9df;
      --on-accent: #14130f;
      --red: #d8736c;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont,
                 "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  button { font: inherit; }

  /* ====== 外枠（紙の額縁） ====== */
  .app-shell {
    width: min(960px, calc(100% - 24px));
    min-height: calc(100vh - 48px);
    margin: 24px auto;
    padding: 28px;
    border: 1px solid var(--line-strong);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  /* ====== 見出しエリア ====== */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    gap: 18px;
    align-items: stretch;
    padding: 0 0 18px;
    border-bottom: 2px solid var(--line-strong);
  }
  .brand-mark {
    margin: 0 0 8px;
    font-size: clamp(1.05rem, 2.5vw, 1.5rem);
    line-height: 1;
    font-weight: 700;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.05rem, 2.5vw, 1.55rem);
    line-height: 1.18;
    font-weight: 700;
  }
  .lead {
    max-width: 620px;
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.65;
  }
  /* 見出し右の状態パネル（件数・更新時刻） */
  .hero-panel {
    padding: 14px;
    border: 1px solid var(--line-strong);
    background: transparent;
    display: grid;
    align-content: center;
  }
  .hero-panel span,
  .hero-panel small {
    display: block;
    color: var(--muted);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hero-panel strong {
    display: block;
    margin: 6px 0 2px;
    color: var(--red);
    font-size: 1.65rem;
    font-weight: 700;
  }

  /* ====== カテゴリ切り替え（タブ） ====== */
  .tabs {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .tab {
    flex: 1 1 auto;
    min-height: 40px;
    padding: 0 14px;
    border: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
    white-space: nowrap;
  }
  .tab:last-child { border-right: 0; }
  .tab:hover { background: var(--panel-soft); }
  .tab.active {
    background: var(--accent);
    color: var(--on-accent);
  }
  /* タブの件数 */
  .tab .tab-count {
    font-size: 0.62rem;
    opacity: 0.7;
    margin-left: 4px;
    font-weight: 700;
  }
  /* 日付グループの見出し（「すべて」表示時） */
  .date-group-head {
    padding: 8px 18px;
    background: var(--panel-soft);
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  /* 近似重複のまとめ表記（他◯媒体） */
  .also-note {
    display: inline-block;
    margin-left: 8px;
    color: var(--muted);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: none;
  }

  /* ====== 操作バー（更新ボタン・状態） ====== */
  .toolbar {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .status {
    color: var(--muted);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .reload-btn {
    min-height: 36px;
    padding: 0 16px;
    border: 1px solid var(--line-strong);
    border-radius: 0;
    background: var(--panel);
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 160ms ease, background 160ms ease;
  }
  .reload-btn:hover { transform: translateY(-1px); background: var(--panel-soft); }

  /* ====== ニュース一覧 ====== */
  .feed {
    margin-top: 16px;
    display: grid;
    gap: 0;
    border: 1px solid var(--line);
    border-bottom: 0;
  }
  .article {
    display: block;
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    transition: background 160ms ease;
  }
  .article:hover { background: var(--panel-soft); }
  .article .cat {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--red);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .article h3 {
    margin: 0 0 8px;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
  }
  .article .meta {
    font-size: 0.66rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .article .meta .meta-text { flex: 1; min-width: 0; }
  .article .meta .src { color: var(--text); }
  /* 共有ボタン（記事ごと） */
  .share-btn {
    flex: none;
    border: 1px solid var(--line-strong);
    background: var(--panel);
    color: var(--text);
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 9px;
    cursor: pointer;
    line-height: 1.2;
    white-space: nowrap;
    transition: background 140ms ease;
  }
  .share-btn:hover { background: var(--panel-soft); }
  .share-btn:active { transform: translateY(1px); }
  /* 新着バッジ（前回閲覧時刻より新しい記事に表示） */
  .new-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 7px;
    border: 1px solid var(--red);
    background: var(--red);
    color: var(--on-accent);
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    vertical-align: middle;
    border-radius: 2px;
  }

  /* ====== 今日のまとめ（ピックアップ） ====== */
  .pickup {
    margin-top: 16px;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .pickup-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-strong);
    background: var(--panel-soft);
    color: var(--text);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pickup-head .pickup-note {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .pickup-item {
    display: block;
    padding: 11px 14px;
    text-decoration: none;
    color: inherit;
    border-bottom: 1px solid var(--line);
    transition: background 160ms ease;
  }
  .pickup-item:last-child { border-bottom: 0; }
  .pickup-item:hover { background: var(--panel-soft); }
  .pickup-item .pickup-title {
    margin: 0;
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.45;
  }
  .pickup-item .pickup-meta {
    margin-top: 5px;
    font-size: 0.62rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .pickup-item .pickup-meta .src { color: var(--text); }
  /* 翻訳時に下へ小さく出す原題 */
  .article .orig {
    margin: -2px 0 8px;
    color: var(--muted);
    font-size: 0.7rem;
    line-height: 1.45;
  }

  /* ====== 読み込み中・空表示 ====== */
  .loading, .empty {
    text-align: center;
    color: var(--muted);
    padding: 50px 20px;
    font-size: 0.8rem;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    color: var(--muted);
    font-size: 0.64rem;
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  /* ====== サイト共通ナビ ====== */
  .site-nav {
    width: min(960px, calc(100% - 24px));
    margin: 24px auto 0;
    display: flex;
    border: 1px solid var(--line-strong);
    border-bottom: 0;
    background: var(--panel);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .site-nav::-webkit-scrollbar { display: none; }
  .site-nav-link {
    white-space: nowrap;
    padding: 0 18px;
    min-height: 38px;
    display: grid;
    place-items: center;
    text-decoration: none;
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-right: 1px solid var(--line);
    transition: background 160ms ease;
    white-space: nowrap;
  }
  .site-nav-link:last-child { border-right: 0; }
  .site-nav-link:hover { background: var(--panel-soft); }
  .site-nav-link.active { background: var(--accent); color: var(--on-accent); }
  body.has-nav .app-shell { margin-top: 0; }
  @media (max-width: 620px) {
    .site-nav { width: min(100% - 16px, 1180px); margin: 8px auto 0; }
  }

  /* ====== スマホ対応 ====== */
  @media (max-width: 620px) {
    .app-shell {
      width: min(100% - 16px, 1180px);
      margin: 8px auto;
      padding: 14px;
    }
    .hero { grid-template-columns: 1fr; }
    .tabs { flex-wrap: wrap; }
    .tab { flex: 1 1 40%; border-bottom: 1px solid var(--line); }
  }
</style>
    <link rel="stylesheet" href="https://sousuyou.github.io/top/theme.css" />
</head>
<body class="has-nav">

<!-- 共通ナビ：中身は nav.js が自動生成（JS無効時はTOPリンクだけ残る） -->
<nav class="site-nav" id="site-nav">
  <a class="site-nav-link" href="https://sousuyou.github.io/top/">TOP</a>
</nav>
<script src="https://sousuyou.github.io/top/nav.js?v=20260622" defer></script>

<main class="app-shell">

  <!-- 見出し -->
  <section class="hero">
    <div>
      <p class="brand-mark">Bar Soutsu</p>
      <p class="eyebrow">Gin News Feed / World &amp; Japan</p>
      <h1>ジン最新ニュース</h1>
      <p class="lead">世界中・日本中のジン情報を自動で収集してお届けします。海外記事は日本語タイトルに翻訳済み。新商品、クラフトジン、バー・業界トレンド、受賞情報をまとめて確認できます。</p>
    </div>
    <div class="hero-panel" aria-label="取得状況">
      <span>記事件数</span>
      <strong id="countNum">—</strong>
      <small id="updatedAt">読み込み中</small>
    </div>
  </section>

  <!-- カテゴリ切り替えタブ -->
  <nav class="tabs" id="tabs"></nav>

  <!-- 操作バー -->
  <div class="toolbar">
    <span class="status" id="status"></span>
    <button class="reload-btn" id="reloadBtn">↻ 最新に更新</button>
  </div>

  <!-- 今日のまとめ（ピックアップ）：最新3件のダイジェスト -->
  <section class="pickup" id="pickup" hidden></section>

  <!-- ニュース一覧 -->
  <div class="feed" id="feed"></div>

  <footer>
    情報源：Googleニュース（世界中のニュースサイトを自動集約）／海外記事はGoogle翻訳で日本語化<br>
    ニュースは約3時間ごとに自動更新されます。記事タイトルをクリックすると発信元サイトが開きます。
  </footer>

</main>

<script src="app.js" defer></script>
<!-- アプリ化（ホーム画面に追加・オフライン対応） -->
<script src="boot.js" defer></script>
</body>
</html>
