<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f1ec">
<!-- 検索エンジンお断り（検索結果に表示させない設定） -->
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Bar Soutsu ジン最新ニュース</title>
<style>
  /* ====== お手本（カクテル原価計算ツール）と同じデザイントークン ====== */
  :root {
    color-scheme: light;
    --bg: #e9e9e5;          /* 背景：生成り色 */
    --paper: #fbfaf6;       /* 紙のパネル */
    --panel: #fbfaf6;
    --panel-soft: #f3f2ee;  /* やや沈んだパネル */
    --field: #ffffff;
    --line: #c9c8c2;        /* 細い罫線 */
    --line-strong: #242424; /* 強い黒の罫線 */
    --text: #161616;        /* 本文の黒 */
    --muted: #6f6d67;       /* 補助グレー */
    --accent: #161616;      /* アクセント＝黒 */
    --red: #a72821;         /* 強調の赤 */
    --shadow: 0 18px 42px rgba(30, 30, 27, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont,
                 "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  button { font: inherit; }

  /* ====== 外枠（紙の額縁） ====== */
  .app-shell {
    width: min(960px, calc(100% - 24px));
    min-height: calc(100vh - 48px);
    margin: 24px auto;
    padding: 28px;
    border: 1px solid var(--line-strong);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  /* ====== 見出しエリア ====== */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    gap: 18px;
    align-items: stretch;
    padding: 0 0 18px;
    border-bottom: 2px solid var(--line-strong);
  }
  .brand-mark {
    margin: 0 0 8px;
    font-size: clamp(1.05rem, 2.5vw, 1.5rem);
    line-height: 1;
    font-weight: 700;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.05rem, 2.5vw, 1.55rem);
    line-height: 1.18;
    font-weight: 700;
  }
  .lead {
    max-width: 620px;
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.65;
  }
  /* 見出し右の状態パネル（件数・更新時刻） */
  .hero-panel {
    padding: 14px;
    border: 1px solid var(--line-strong);
    background: transparent;
    display: grid;
    align-content: center;
  }
  .hero-panel span,
  .hero-panel small {
    display: block;
    color: var(--muted);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hero-panel strong {
    display: block;
    margin: 6px 0 2px;
    color: var(--red);
    font-size: 1.65rem;
    font-weight: 700;
  }

  /* ====== カテゴリ切り替え（タブ） ====== */
  .tabs {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .tab {
    flex: 1 1 auto;
    min-height: 40px;
    padding: 0 14px;
    border: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
    white-space: nowrap;
  }
  .tab:last-child { border-right: 0; }
  .tab:hover { background: var(--panel-soft); }
  .tab.active {
    background: var(--accent);
    color: #ffffff;
  }

  /* ====== 操作バー（更新ボタン・状態） ====== */
  .toolbar {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .status {
    color: var(--muted);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .reload-btn {
    min-height: 36px;
    padding: 0 16px;
    border: 1px solid var(--line-strong);
    border-radius: 0;
    background: var(--panel);
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 160ms ease, background 160ms ease;
  }
  .reload-btn:hover { transform: translateY(-1px); background: var(--panel-soft); }

  /* ====== ニュース一覧 ====== */
  .feed {
    margin-top: 16px;
    display: grid;
    gap: 0;
    border: 1px solid var(--line);
    border-bottom: 0;
  }
  .article {
    display: block;
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    transition: background 160ms ease;
  }
  .article:hover { background: var(--panel-soft); }
  .article .cat {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--red);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .article h3 {
    margin: 0 0 8px;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
  }
  .article .meta {
    font-size: 0.66rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .article .meta .src { color: var(--text); }
  /* 翻訳時に下へ小さく出す原題 */
  .article .orig {
    margin: -2px 0 8px;
    color: var(--muted);
    font-size: 0.7rem;
    line-height: 1.45;
  }

  /* ====== 読み込み中・空表示 ====== */
  .loading, .empty {
    text-align: center;
    color: var(--muted);
    padding: 50px 20px;
    font-size: 0.8rem;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    color: var(--muted);
    font-size: 0.64rem;
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  /* ====== サイト共通ナビ ====== */
  .site-nav {
    width: min(960px, calc(100% - 24px));
    margin: 24px auto 0;
    display: flex;
    border: 1px solid var(--line-strong);
    border-bottom: 0;
    background: var(--panel);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .site-nav::-webkit-scrollbar { display: none; }
  .site-nav-link {
    white-space: nowrap;
    padding: 0 18px;
    min-height: 38px;
    display: grid;
    place-items: center;
    text-decoration: none;
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-right: 1px solid var(--line);
    transition: background 160ms ease;
    white-space: nowrap;
  }
  .site-nav-link:last-child { border-right: 0; }
  .site-nav-link:hover { background: var(--panel-soft); }
  .site-nav-link.active { background: var(--accent); color: #fff; }
  body.has-nav .app-shell { margin-top: 0; }
  @media (max-width: 620px) {
    .site-nav { width: min(100% - 16px, 1180px); margin: 8px auto 0; }
  }

  /* ====== スマホ対応 ====== */
  @media (max-width: 620px) {
    .app-shell {
      width: min(100% - 16px, 1180px);
      margin: 8px auto;
      padding: 14px;
    }
    .hero { grid-template-columns: 1fr; }
    .tabs { flex-wrap: wrap; }
    .tab { flex: 1 1 40%; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body class="has-nav">

<!-- 共通ナビ：中身は nav.js が自動生成（JS無効時はTOPリンクだけ残る） -->
<nav class="site-nav" id="site-nav">
  <a class="site-nav-link" href="https://sousuyou.github.io/top/">TOP</a>
</nav>
<script src="https://sousuyou.github.io/top/nav.js" defer></script>

<main class="app-shell">

  <!-- 見出し -->
  <section class="hero">
    <div>
      <p class="brand-mark">Bar Soutsu</p>
      <p class="eyebrow">Gin News Feed / World &amp; Japan</p>
      <h1>ジン最新ニュース</h1>
      <p class="lead">世界中・日本中のジン情報を自動で収集してお届けします。海外記事は日本語タイトルに翻訳済み。新商品、クラフトジン、バー・業界トレンド、受賞情報をまとめて確認できます。</p>
    </div>
    <div class="hero-panel" aria-label="取得状況">
      <span>記事件数</span>
      <strong id="countNum">—</strong>
      <small id="updatedAt">読み込み中</small>
    </div>
  </section>

  <!-- カテゴリ切り替えタブ -->
  <nav class="tabs" id="tabs"></nav>

  <!-- 操作バー -->
  <div class="toolbar">
    <span class="status" id="status"></span>
    <button class="reload-btn" id="reloadBtn">↻ 最新に更新</button>
  </div>

  <!-- ニュース一覧 -->
  <div class="feed" id="feed"></div>

  <footer>
    情報源：Googleニュース（世界中のニュースサイトを自動集約）／海外記事はGoogle翻訳で日本語化<br>
    ニュースは約3時間ごとに自動更新されます。記事タイトルをクリックすると発信元サイトが開きます。
  </footer>

</main>

<script>
/* =========================================================
   ■ カテゴリの定義（表示順とタブ名）
   実際のニュースデータは news.json にあらかじめ用意されており、
   このページはそれを読み込んで表示するだけです（中継サービス不要）。
   ニュースの取得・英語タイトルの翻訳は、GitHubの自動機能が
   約3時間ごとにサーバー側で行っています（build_news.py）。
   ========================================================= */
const CATEGORIES = [
  { id: "all",   name: "すべて" },
  { id: "world", name: "海外の新商品" },
  { id: "japan", name: "日本のクラフトジン" },
  { id: "trend", name: "バー・業界トレンド" },
  { id: "award", name: "受賞・コンペ" },
];

let newsData = null;        // 読み込んだ news.json をまるごと保持
let currentCategory = "all";

const feedEl = document.getElementById("feed");
const statusEl = document.getElementById("status");
const countNumEl = document.getElementById("countNum");
const updatedAtEl = document.getElementById("updatedAt");

/* =========================================================
   ■ データの読み込み
   ========================================================= */
async function loadData() {
  feedEl.innerHTML = '<div class="loading"><div class="spinner"></div>ニュースを読み込んでいます…</div>';
  statusEl.textContent = "読み込み中…";
  countNumEl.textContent = "—";
  updatedAtEl.textContent = "読み込み中";

  try {
    // キャッシュ回避のため時刻を付けて毎回最新の news.json を取得
    const res = await fetch("news.json?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("読み込み失敗");
    newsData = await res.json();
  } catch (e) {
    newsData = null;
    feedEl.innerHTML = '<div class="empty">ニュースデータを読み込めませんでした。<br>少し時間をおいて「↻ 最新に更新」を押してみてください。</div>';
    statusEl.textContent = "";
    countNumEl.textContent = "0";
    updatedAtEl.textContent = "読み込み失敗";
    return;
  }
  showCategory(currentCategory);
}

/* =========================================================
   ■ カテゴリごとの記事リストを作る
   ========================================================= */
function articlesFor(catId) {
  if (!newsData || !newsData.categories) return [];
  if (catId !== "all") {
    return (newsData.categories[catId] || []).slice();
  }
  // 「すべて」= 全カテゴリを結合し、タイトルで重複を除去して新しい順に
  const merged = [];
  const seen = new Set();
  Object.keys(newsData.categories).forEach((cid) => {
    newsData.categories[cid].forEach((a) => {
      const key = (a.title || "").trim();
      if (seen.has(key)) return;
      seen.add(key);
      merged.push(Object.assign({ _cat: cid }, a));
    });
  });
  merged.sort((x, y) => (y.date || "").localeCompare(x.date || ""));
  return merged;
}

// カテゴリIDから表示名を引く
function catName(catId) {
  const c = CATEGORIES.find((c) => c.id === catId);
  return c ? c.name : "";
}

/* =========================================================
   ■ 画面に表示する
   ========================================================= */
function showCategory(catId) {
  currentCategory = catId;
  const articles = articlesFor(catId);
  render(articles);
}

function render(articles) {
  if (!articles || articles.length === 0) {
    feedEl.innerHTML = '<div class="empty">このカテゴリのニュースはまだありません。</div>';
    statusEl.textContent = "";
    countNumEl.textContent = "0";
    return;
  }

  const showCat = currentCategory === "all"; // 「すべて」表示の時だけカテゴリ名を出す
  feedEl.innerHTML = articles.map((a) => {
    const dateStr = a.date ? formatDate(a.date) : "";
    const cat = a._cat || currentCategory;
    return `
      <a class="article" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
        ${showCat ? `<span class="cat">${escapeHtml(catName(cat))}</span>` : ""}
        <h3>${escapeHtml(a.title)}</h3>
        ${a.originalTitle ? `<div class="orig">原題: ${escapeHtml(a.originalTitle)}</div>` : ""}
        <div class="meta">
          <span class="src">${escapeHtml(a.source || "ニュース")}</span>${dateStr ? " ・ " + dateStr : ""}
        </div>
      </a>`;
  }).join("");

  statusEl.textContent = "新しい順に表示中";
  countNumEl.textContent = articles.length;
  // 更新時刻は news.json の updated を表示
  if (newsData && newsData.updated) {
    updatedAtEl.textContent = "更新 " + formatDate(newsData.updated);
  }
}

// 日付（ISO文字列）を見やすい形にする
function formatDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return "たった今";
  if (diffMin < 60) return `${diffMin}分前`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour}時間前`;
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

// 安全のため、文字列をそのまま表示できる形に変換
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* =========================================================
   ■ タブ（カテゴリ切り替えボタン）を作る
   ========================================================= */
const tabsEl = document.getElementById("tabs");
CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = cat.name;
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");
    showCategory(cat.id);
  };
  tabsEl.appendChild(btn);
});

// 「最新に更新」ボタン（news.jsonを取り直す）
document.getElementById("reloadBtn").onclick = () => loadData();

// 最初の読み込み
loadData();
</script>
</body>
</html>
