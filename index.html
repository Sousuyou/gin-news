<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f1ec">
<title>Bar Soutsu ジン最新ニュース</title>
<style>
  /* ====== お手本（カクテル原価計算ツール）と同じデザイントークン ====== */
  :root {
    color-scheme: light;
    --bg: #e9e9e5;          /* 背景：生成り色 */
    --paper: #fbfaf6;       /* 紙のパネル */
    --panel: #fbfaf6;
    --panel-soft: #f3f2ee;  /* やや沈んだパネル */
    --field: #ffffff;
    --line: #c9c8c2;        /* 細い罫線 */
    --line-strong: #242424; /* 強い黒の罫線 */
    --text: #161616;        /* 本文の黒 */
    --muted: #6f6d67;       /* 補助グレー */
    --accent: #161616;      /* アクセント＝黒 */
    --red: #a72821;         /* 強調の赤 */
    --shadow: 0 18px 42px rgba(30, 30, 27, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont,
                 "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  button { font: inherit; }

  /* ====== 外枠（紙の額縁） ====== */
  .app-shell {
    width: min(960px, calc(100% - 24px));
    min-height: calc(100vh - 48px);
    margin: 24px auto;
    padding: 28px;
    border: 1px solid var(--line-strong);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  /* ====== 見出しエリア ====== */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    gap: 18px;
    align-items: stretch;
    padding: 0 0 18px;
    border-bottom: 2px solid var(--line-strong);
  }
  .brand-mark {
    margin: 0 0 8px;
    font-size: clamp(1.05rem, 2.5vw, 1.5rem);
    line-height: 1;
    font-weight: 700;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.05rem, 2.5vw, 1.55rem);
    line-height: 1.18;
    font-weight: 700;
  }
  .lead {
    max-width: 620px;
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.65;
  }
  /* 見出し右の状態パネル（件数・更新時刻） */
  .hero-panel {
    padding: 14px;
    border: 1px solid var(--line-strong);
    background: transparent;
    display: grid;
    align-content: center;
  }
  .hero-panel span,
  .hero-panel small {
    display: block;
    color: var(--muted);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hero-panel strong {
    display: block;
    margin: 6px 0 2px;
    color: var(--red);
    font-size: 1.65rem;
    font-weight: 700;
  }

  /* ====== カテゴリ切り替え（タブ） ====== */
  .tabs {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .tab {
    flex: 1 1 auto;
    min-height: 40px;
    padding: 0 14px;
    border: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
    white-space: nowrap;
  }
  .tab:last-child { border-right: 0; }
  .tab:hover { background: var(--panel-soft); }
  .tab.active {
    background: var(--accent);
    color: #ffffff;
  }

  /* ====== 操作バー（更新ボタン・状態） ====== */
  .toolbar {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .status {
    color: var(--muted);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .reload-btn {
    min-height: 36px;
    padding: 0 16px;
    border: 1px solid var(--line-strong);
    border-radius: 0;
    background: var(--panel);
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 160ms ease, background 160ms ease;
  }
  .reload-btn:hover { transform: translateY(-1px); background: var(--panel-soft); }

  /* ====== ニュース一覧 ====== */
  .feed {
    margin-top: 16px;
    display: grid;
    gap: 0;
    border: 1px solid var(--line);
    border-bottom: 0;
  }
  .article {
    display: block;
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    transition: background 160ms ease;
  }
  .article:hover { background: var(--panel-soft); }
  .article .cat {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--red);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .article h3 {
    margin: 0 0 8px;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
  }
  .article .meta {
    font-size: 0.66rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .article .meta .src { color: var(--text); }

  /* ====== 読み込み中・空表示 ====== */
  .loading, .empty {
    text-align: center;
    color: var(--muted);
    padding: 50px 20px;
    font-size: 0.8rem;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    color: var(--muted);
    font-size: 0.64rem;
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  /* ====== スマホ対応 ====== */
  @media (max-width: 620px) {
    .app-shell {
      width: min(100% - 16px, 1180px);
      margin: 8px auto;
      padding: 14px;
    }
    .hero { grid-template-columns: 1fr; }
    .tabs { flex-wrap: wrap; }
    .tab { flex: 1 1 40%; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>

<main class="app-shell">

  <!-- 見出し -->
  <section class="hero">
    <div>
      <p class="brand-mark">Bar Soutsu</p>
      <p class="eyebrow">Gin News Feed / World &amp; Japan</p>
      <h1>ジン最新ニュース</h1>
      <p class="lead">世界中・日本中のジン情報を自動で収集してお届けします。新商品、クラフトジン、バー・業界トレンド、受賞情報をまとめて確認できます。</p>
    </div>
    <div class="hero-panel" aria-label="取得状況">
      <span>記事件数</span>
      <strong id="countNum">—</strong>
      <small id="updatedAt">読み込み中</small>
    </div>
  </section>

  <!-- カテゴリ切り替えタブ -->
  <nav class="tabs" id="tabs"></nav>

  <!-- 操作バー -->
  <div class="toolbar">
    <span class="status" id="status"></span>
    <button class="reload-btn" id="reloadBtn">↻ 最新に更新</button>
  </div>

  <!-- ニュース一覧 -->
  <div class="feed" id="feed"></div>

  <footer>
    情報源：Googleニュース（世界中のニュースサイトを自動集約）<br>
    記事タイトルをクリックすると、発信元サイトが開きます。
  </footer>

</main>

<script>
/* =========================================================
   ■ カテゴリの設定
   各カテゴリごとに「Googleニュースで何を検索するか」を決めています。
   検索ワードを変えれば、読みたいニュースを自由に調整できます。
   q   : 検索キーワード
   lang: 言語と地域（ja=日本語/日本、en=英語/アメリカ）
   ========================================================= */
const CATEGORIES = [
  {
    id: "all",
    name: "すべて",
    // 「すべて」は下の各カテゴリを全部まとめて表示します
  },
  {
    id: "world",
    name: "海外の新商品",
    feeds: [
      { q: "gin distillery new release", lang: "en" },
      { q: "new gin launch brand",       lang: "en" },
    ],
  },
  {
    id: "japan",
    name: "日本のクラフトジン",
    feeds: [
      { q: "クラフトジン",            lang: "ja" },
      { q: "ジン 蒸留所 新発売",      lang: "ja" },
    ],
  },
  {
    id: "trend",
    name: "バー・業界トレンド",
    feeds: [
      { q: "gin cocktail bar trend",  lang: "en" },
      { q: "ジン カクテル バー",       lang: "ja" },
    ],
  },
  {
    id: "award",
    name: "受賞・コンペ",
    feeds: [
      { q: "gin awards winner",            lang: "en" },
      { q: "World Gin Awards",             lang: "en" },
    ],
  },
];

/* =========================================================
   ■ ニュースの取得処理
   GoogleニュースのRSS（ニュース配信データ）を読み込みます。
   そのままだとブラウザの制限で読めないため、
   間に「中継サービス」を挟んでデータを取得します。
   うまくいかない時のために中継サービスを2つ用意し、
   順番に試します。
   ========================================================= */

// 中継サービス（プロキシ）の一覧。前から順に試します。
const PROXIES = [
  (url) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  (url) => "https://corsproxy.io/?url=" + encodeURIComponent(url),
];

// GoogleニュースのRSSのURLを組み立てる
function buildGoogleNewsUrl(q, lang) {
  const base = "https://news.google.com/rss/search?q=" + encodeURIComponent(q);
  if (lang === "ja") {
    return base + "&hl=ja&gl=JP&ceid=JP:ja";
  }
  return base + "&hl=en-US&gl=US&ceid=US:en";
}

// 1つのRSSを取得して、記事の配列に変換する
async function fetchFeed(feed, categoryName) {
  const rssUrl = buildGoogleNewsUrl(feed.q, feed.lang);

  // 中継サービスを順番に試す
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(rssUrl), { cache: "no-store" });
      if (!res.ok) continue;
      const text = await res.text();
      const items = parseRss(text, categoryName);
      if (items.length > 0) return items;
    } catch (e) {
      // この中継がダメだったら次を試す
    }
  }
  return []; // 全部ダメだった場合は空
}

// RSS（XML形式の文字データ）を読み取って記事リストにする
function parseRss(xmlText, categoryName) {
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  const items = [...doc.querySelectorAll("item")];
  return items.map((item) => {
    const title = item.querySelector("title")?.textContent || "(タイトルなし)";
    const link  = item.querySelector("link")?.textContent || "#";
    const pubDate = item.querySelector("pubDate")?.textContent || "";
    // Googleニュースは「タイトル - 発信元」の形式なので発信元を分離
    let cleanTitle = title;
    let source = item.querySelector("source")?.textContent || "";
    const dashIndex = title.lastIndexOf(" - ");
    if (!source && dashIndex > 0) {
      cleanTitle = title.slice(0, dashIndex);
      source = title.slice(dashIndex + 3);
    }
    return {
      title: cleanTitle,
      link,
      source,
      date: pubDate ? new Date(pubDate) : null,
      category: categoryName,
    };
  });
}

/* =========================================================
   ■ 画面に表示する処理
   ========================================================= */
const feedEl = document.getElementById("feed");
const statusEl = document.getElementById("status");
const countNumEl = document.getElementById("countNum");
const updatedAtEl = document.getElementById("updatedAt");
let currentCategory = "all";
let cache = {}; // 一度取得したニュースを覚えておく入れ物

// 指定したカテゴリのニュースを取得して表示
async function loadCategory(catId, forceReload = false) {
  currentCategory = catId;

  // 「すべて」の場合は、世界・日本・トレンド・受賞を全部対象にする
  const targets = catId === "all"
    ? CATEGORIES.filter((c) => c.feeds)
    : CATEGORIES.filter((c) => c.id === catId);

  // すでに取得済みで再取得不要ならそれを表示
  if (!forceReload && cache[catId]) {
    render(cache[catId]);
    return;
  }

  // 読み込み中の表示
  feedEl.innerHTML = '<div class="loading"><div class="spinner"></div>世界中からニュースを集めています…</div>';
  statusEl.textContent = "取得中…";
  countNumEl.textContent = "—";
  updatedAtEl.textContent = "読み込み中";

  // 各カテゴリ・各検索ワードのRSSをまとめて取得
  const allFeeds = [];
  targets.forEach((cat) => {
    cat.feeds.forEach((f) => allFeeds.push(fetchFeed(f, cat.name)));
  });

  let results = [];
  try {
    const lists = await Promise.all(allFeeds);
    results = lists.flat();
  } catch (e) {
    results = [];
  }

  // 重複記事（同じタイトル）をまとめる
  const seen = new Set();
  results = results.filter((a) => {
    const key = a.title.trim();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // 新しい順に並べ替え
  results.sort((a, b) => {
    if (!a.date) return 1;
    if (!b.date) return -1;
    return b.date - a.date;
  });

  cache[catId] = results;
  render(results);
}

// 記事リストを実際に画面へ描き出す
function render(articles) {
  if (!articles || articles.length === 0) {
    feedEl.innerHTML = '<div class="empty">ニュースを取得できませんでした。<br>少し時間をおいて「↻ 最新に更新」を押してみてください。</div>';
    statusEl.textContent = "";
    countNumEl.textContent = "0";
    updatedAtEl.textContent = "取得失敗";
    return;
  }

  feedEl.innerHTML = articles.map((a) => {
    const dateStr = a.date ? formatDate(a.date) : "";
    const showCat = currentCategory === "all"; // 「すべて」表示の時だけカテゴリ名を出す
    return `
      <a class="article" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
        ${showCat ? `<span class="cat">${escapeHtml(a.category)}</span>` : ""}
        <h3>${escapeHtml(a.title)}</h3>
        <div class="meta">
          <span class="src">${escapeHtml(a.source || "ニュース")}</span>${dateStr ? " ・ " + dateStr : ""}
        </div>
      </a>`;
  }).join("");

  statusEl.textContent = "新しい順に表示中";
  countNumEl.textContent = articles.length;
  updatedAtEl.textContent = "更新 " + formatDate(new Date());
}

// 日付を見やすい形にする
function formatDate(d) {
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 60) return diffMin <= 1 ? "たった今" : `${diffMin}分前`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour}時間前`;
  const m = d.getMonth() + 1;
  const day = d.getDate();
  return `${m}月${day}日`;
}

// 安全のため、文字列をそのまま表示できる形に変換
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* =========================================================
   ■ タブ（カテゴリ切り替えボタン）を作る
   ========================================================= */
const tabsEl = document.getElementById("tabs");
CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = cat.name;
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");
    loadCategory(cat.id);
  };
  tabsEl.appendChild(btn);
});

// 「最新に更新」ボタン
document.getElementById("reloadBtn").onclick = () => {
  loadCategory(currentCategory, true);
};

// ページを開いたら最初に「すべて」を読み込む
loadCategory("all");
</script>
</body>
</html>
