name: ニュース自動更新

# 実行タイミング：3時間ごと（自動）＋ 手動ボタン
on:
  schedule:
    - cron: "0 */3 * * *"   # UTC基準で3時間ごと
  workflow_dispatch:          # GitHubの画面から手動実行できるボタン

permissions:
  contents: write             # news.json をコミットするための権限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ニュース取得＋翻訳（news.json を生成）
        run: python build_news.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || (git commit -m "ニュース自動更新 $(date -u +%Y-%m-%dT%H:%MZ)" && git push)
